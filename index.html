<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friendsphere.app</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #000;
      color: #fff;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 680px;
      overflow: hidden;
      background-image:
        linear-gradient(90deg, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.38) 34%, rgba(0,0,0,0.08) 74%),
        linear-gradient(180deg, rgba(0,0,0,0.22) 0%, rgba(0,0,0,0.10) 55%, rgba(0,0,0,0.48) 100%),
        url("hero.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .top-nav {
      position: absolute;
      top: 30px;
      right: 112px;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 34px;
      font-size: 15px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
      user-select: none;
    }

    .top-nav span {
      cursor: default;
      opacity: 0.94;
    }

    .language-wrap {
      position: absolute;
      top: 22px;
      right: 26px;
      z-index: 3;
    }

    .language-select {
      appearance: none;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.56);
      border-radius: 999px;
      padding: 8px 30px 8px 15px;
      font-size: 14px;
      font-weight: 700;
      outline: none;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .language-wrap::after {
      content: "⌄";
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-57%);
      color: #fff;
      pointer-events: none;
      font-size: 15px;
    }

    .language-select option {
      color: #111;
      background: #fff;
    }

    .hero-content {
      position: absolute;
      left: 62px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      max-width: 560px;
      text-align: left;
    }

    h1 {
      margin: 0;
      font-size: clamp(46px, 5.6vw, 74px);
      line-height: 0.98;
      letter-spacing: -0.055em;
      font-weight: 800;
      text-shadow: 0 4px 22px rgba(0,0,0,0.35);
    }

    .subtitle {
      margin-top: 18px;
      max-width: 370px;
      font-size: clamp(22px, 2.5vw, 34px);
      line-height: 1.32;
      font-weight: 600;
      letter-spacing: -0.035em;
      text-shadow: 0 3px 18px rgba(0,0,0,0.38);
    }

    .buttons {
      display: flex;
      gap: 14px;
      margin-top: 30px;
      align-items: center;
    }

    .button {
      border-radius: 999px;
      padding: 15px 31px;
      font-size: 16px;
      font-weight: 750;
      line-height: 1;
      user-select: none;
      cursor: default;
      white-space: nowrap;
    }

    .button-red {
      background: #f0141e;
      color: #fff;
    }

    .button-ghost {
      background: transparent;
      color: #fff;
      border: 1.4px solid rgba(255,255,255,0.84);
    }

    .support-block {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      text-align: center;
      color: #fff;
      white-space: nowrap;
    }

    .support-email {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.72;
      letter-spacing: 0.015em;
    }

    .year {
      margin-top: 5px;
      font-size: 11px;
      opacity: 0.55;
    }

    @media (max-width: 760px) {
      .hero {
        min-height: 620px;
        background-position: 72% center;
      }

      .top-nav {
        top: 70px;
        right: 24px;
        gap: 18px;
        font-size: 13px;
      }

      .hero-content {
        left: 28px;
        right: 22px;
        max-width: none;
      }

      .buttons {
        flex-wrap: wrap;
      }

      .button {
        padding: 14px 24px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="top-nav">
      <span data-i18n="navApps">Apps</span>
      <span data-i18n="navSocials">Socials</span>
      <span data-i18n="navSupport">Support</span>
    </div>

    <div class="language-wrap">
      <select id="languageSelect" class="language-select" aria-label="Language">
        <option value="en">EN</option>
        <option value="uk">UA</option>
      </select>
    </div>

    <div class="hero-content">
      <h1 data-i18n="brand">Friendsphere.app</h1>
      <div class="subtitle" data-i18n="subtitle">We create apps that help people connect.</div>

      <div class="buttons">
        <div class="button button-red" data-i18n="explore">Explore Apps</div>
        <div class="button button-ghost" data-i18n="learn">Learn More</div>
      </div>
    </div>

    <div class="support-block">
      <div class="support-email">friendsphere.app@icloud.com</div>
      <div class="year">© 2026</div>
    </div>
  </section>

  <script>
    const translations = {
      en: {
        brand: "Friendsphere.app",
        subtitle: "We create apps that help people connect.",
        explore: "Explore Apps",
        learn: "Learn More",
        navApps: "Apps",
        navSocials: "Socials",
        navSupport: "Support"
      },
      uk: {
        brand: "Friendsphere.app",
        subtitle: "Ми створюємо додатки, які допомагають людям знаходити одне одного.",
        explore: "Переглянути додатки",
        learn: "Дізнатися більше",
        navApps: "Додатки",
        navSocials: "Соцмережі",
        navSupport: "Підтримка"
      }
    };

    const languageSelect = document.getElementById("languageSelect");

    function setLanguage(lang) {
      const dict = translations[lang] || translations.en;
      document.documentElement.lang = lang;
      localStorage.setItem("friendsphere_language", lang);

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        el.innerHTML = dict[key];
      });

      languageSelect.value = lang;
    }

    languageSelect.addEventListener("change", (event) => {
      setLanguage(event.target.value);
    });

    setLanguage(localStorage.getItem("friendsphere_language") || "en");
  </script>
</body>
</html>
