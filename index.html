<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friendsphere.app</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #000;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      background-image:
        linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.35) 40%, rgba(0,0,0,0.65) 100%),
        url("hero.jpg");
      background-size: cover;
      background-position: right center;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      color: #fff;
      text-align: left;
      padding: 20px;
    }

    .top-nav {
      position: absolute;
      top: 31px;
      right: 110px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 34px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
      user-select: none;
    }

    .top-nav span {
      cursor: default;
      opacity: 0.92;
    }

    .language-wrap {
      position: absolute;
      top: 24px;
      right: 24px;
      z-index: 2;
    }

    .language-select {
      appearance: none;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 999px;
      padding: 8px 28px 8px 14px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .hero-content {
      max-width: 600px;
      z-index: 1;
      margin-left: 40px;
    }

    h1 {
      font-size: clamp(42px, 6vw, 72px);
      margin: 0;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin-top: 18px;
      font-size: clamp(20px, 2.5vw, 32px);
      line-height: 1.3;
      opacity: 0.95;
    }

    .support-block {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #fff;
      z-index: 2;
    }

    .support-title {
      display: none;
    }

    .support-email {
      margin-top: 0;
      font-size: 13px;
      font-weight: 400;
      opacity: 0.75;
      letter-spacing: 0.02em;
    }

    .year {
      margin-top: 6px;
      font-size: 12px;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .top-nav {
        top: 70px;
        right: 20px;
        gap: 18px;
        font-size: 13px;
      }

      .support-block {
        bottom: 24px;
      }

      .support-email {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">

    <div class="top-nav">
      <span data-i18n="navApps">Apps</span>
      <span data-i18n="navSocials">Socials</span>
      <span data-i18n="navSupport">Support</span>
    </div>

    <div class="language-wrap">
      <select id="languageSelect" class="language-select">
        <option value="en">EN</option>
        <option value="uk">UA</option>
      </select>
    </div>

    <div class="hero-content">
      <h1 data-i18n="brand">Friendsphere.app</h1>
      <div class="subtitle" data-i18n="subtitle">We create apps that help people connect.</div>

      <div class="buttons">
        <div class="button button-red" data-i18n="explore">Explore Apps</div>
        <div class="button button-ghost" data-i18n="learn">Learn More</div>
      </div>
    </div>
    </div>

    <div class="support-block">
      <div class="support-title" data-i18n="support">Support</div>
      <div class="support-email">friendsphere.app@icloud.com</div>
      <div class="year">© 2026</div>
    </div>

  </section>

  <script>
    const translations = {
      en: {
        brand: "Friendsphere.app",
        subtitle: "We create apps that help people connect.",
        support: "Support",
        navApps: "Apps",
        navSocials: "Socials",
        navSupport: "Support",
        explore: "Explore Apps",
        learn: "Learn More"
      },
      uk: {
        brand: "Friendsphere.app",
        subtitle: "Ми створюємо додатки, які допомагають людям знаходити одне одного.",
        support: "Підтримка",
        navApps: "Додатки",
        navSocials: "Соцмережі",
        navSupport: "Підтримка",
        explore: "Переглянути додатки",
        learn: "Дізнатися більше"
      }
    };

    const languageSelect = document.getElementById("languageSelect");

    function setLanguage(lang) {
      const dict = translations[lang] || translations.en;
      document.documentElement.lang = lang;
      localStorage.setItem("friendsphere_language", lang);

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        el.innerHTML = dict[key];
      });

      languageSelect.value = lang;
    }

    languageSelect.addEventListener("change", e => setLanguage(e.target.value));

    setLanguage(localStorage.getItem("friendsphere_language") || "en");
  </script>

</body>
</html>
