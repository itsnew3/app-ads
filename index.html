<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friendsphere.app</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #f4f4f6;
      color: #151515;
    }

    .page {
      max-width: 1440px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .hero {
      position: relative;
      min-height: 74vh;
      padding: 48px 64px;
      display: flex;
      align-items: center;
      background-image:
        linear-gradient(90deg, rgba(0, 0, 0, 0.58) 0%, rgba(0, 0, 0, 0.34) 38%, rgba(0, 0, 0, 0.08) 100%),
        url("hero.jpg");
      background-size: cover;
      background-position: center;
      color: #fff;
    }

    .language-wrap {
      position: absolute;
      top: 30px;
      right: 34px;
      z-index: 3;
    }

    .language-select {
      appearance: none;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 999px;
      padding: 9px 34px 9px 16px;
      font-size: 15px;
      font-weight: 700;
      outline: none;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }

    .language-wrap::after {
      content: "⌄";
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-56%);
      color: #fff;
      pointer-events: none;
      font-size: 16px;
    }

    .language-select option {
      color: #111;
      background: #fff;
    }

    .hero-content {
      max-width: 620px;
      position: relative;
      z-index: 2;
    }

    h1 {
      margin: 0;
      font-size: clamp(48px, 6vw, 82px);
      line-height: 0.96;
      letter-spacing: -0.06em;
      font-weight: 800;
    }

    .subtitle {
      margin-top: 28px;
      max-width: 430px;
      font-size: clamp(25px, 3vw, 39px);
      line-height: 1.23;
      font-weight: 600;
      letter-spacing: -0.035em;
    }

    .buttons {
      display: flex;
      gap: 14px;
      margin-top: 34px;
      flex-wrap: wrap;
    }

    .button {
      border: none;
      border-radius: 999px;
      padding: 16px 32px;
      font-size: 17px;
      font-weight: 700;
      cursor: default;
      user-select: none;
    }

    .button-red {
      background: #f0141e;
      color: #fff;
      box-shadow: 0 12px 28px rgba(240, 20, 30, 0.32);
    }

    .button-ghost {
      background: rgba(0, 0, 0, 0.08);
      color: #fff;
      border: 1.5px solid rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(10px);
    }

    .bottom {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr 0.9fr;
      gap: 42px;
      align-items: center;
      padding: 38px 76px 46px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfaf9 100%);
    }

    .app-card {
      display: flex;
      align-items: center;
      gap: 26px;
      min-height: 150px;
      padding: 22px 30px;
      border-radius: 16px;
      border: 1px solid rgba(0, 0, 0, 0.09);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.06);
    }

    .app-icon {
      width: 112px;
      height: 112px;
      border-radius: 24px;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 900;
      font-size: 20px;
      line-height: 1.12;
      letter-spacing: -0.06em;
      flex-shrink: 0;
      box-shadow: inset 0 -18px 0 rgba(119, 62, 255, 0.42);
    }

    .app-info {
      flex: 1;
    }

    .app-title {
      font-size: 25px;
      font-weight: 800;
      letter-spacing: -0.035em;
      margin-bottom: 12px;
    }

    .app-text {
      color: #2c2c2e;
      font-size: 16px;
      line-height: 1.45;
    }

    .arrow {
      font-size: 42px;
      line-height: 1;
      color: #151515;
      opacity: 0.9;
    }

    .info-block {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .round-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffe4e6;
      color: #f0141e;
      font-size: 27px;
      flex-shrink: 0;
    }

    .block-title {
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 7px;
      letter-spacing: -0.025em;
    }

    .block-text,
    .fake-link {
      color: #2c2c2e;
      font-size: 17px;
      line-height: 1.55;
      text-decoration: none;
      cursor: default;
      overflow-wrap: anywhere;
    }

    .socials-list {
      display: grid;
      gap: 9px;
    }

    .social-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .social-icon {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .instagram {
      background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4);
    }

    .telegram {
      background: #2aabee;
      border-radius: 50%;
    }

    @media (max-width: 920px) {
      .hero {
        min-height: 68vh;
        padding: 38px 26px;
        background-position: center top;
      }

      .bottom {
        grid-template-columns: 1fr;
        padding: 28px 22px 36px;
        gap: 28px;
      }

      .app-card {
        padding: 18px;
        gap: 18px;
      }

      .app-icon {
        width: 86px;
        height: 86px;
        border-radius: 20px;
        font-size: 16px;
      }

      .app-title {
        font-size: 21px;
      }

      .arrow {
        font-size: 32px;
      }
    }

    @media (max-width: 560px) {
      .hero {
        min-height: 72vh;
        padding: 96px 22px 36px;
      }

      .language-wrap {
        top: 22px;
        right: 20px;
      }

      .subtitle {
        max-width: 310px;
      }

      .button {
        width: 100%;
      }

      .app-card {
        align-items: flex-start;
      }

      .arrow {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="language-wrap">
        <select id="languageSelect" class="language-select" aria-label="Language">
          <option value="en">EN</option>
          <option value="uk">UA</option>
        </select>
      </div>

      <div class="hero-content">
        <h1 data-i18n="brand">Friendsphere.app</h1>
        <div class="subtitle" data-i18n="subtitle">We create apps that help people connect.</div>

        <div class="buttons">
          <div class="button button-red" data-i18n="explore">Explore Apps</div>
          <div class="button button-ghost" data-i18n="learn">Learn More</div>
        </div>
      </div>
    </section>

    <section class="bottom">
      <div class="app-card" aria-disabled="true">
        <div class="app-icon">
          WEIRD<br />OR<br />NORMAL?
        </div>

        <div class="app-info">
          <div class="app-title" data-i18n="appName">Weird or Normal</div>
          <div class="app-text" data-i18n="appDescription">
            Fun questions. Honest answers.<br />Find out what's weird or totally normal.
          </div>
        </div>

        <div class="arrow">→</div>
      </div>

      <div class="info-block">
        <div class="round-icon">✉</div>
        <div>
          <div class="block-title" data-i18n="support">Support</div>
          <div class="block-text">friendsphere.app@icloud.com</div>
        </div>
      </div>

      <div>
        <div class="block-title" data-i18n="socialTitle">We're on social media</div>
        <div class="socials-list">
          <div class="social-row">
            <span class="social-icon instagram">◎</span>
            <span class="fake-link">instagram.com/itsnew3</span>
          </div>
          <div class="social-row">
            <span class="social-icon telegram">➤</span>
            <span class="fake-link">t.me/itsnew3</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const translations = {
      en: {
        brand: "Friendsphere.app",
        subtitle: "We create apps that help people connect.",
        explore: "Explore Apps",
        learn: "Learn More",
        appName: "Weird or Normal",
        appDescription: "Fun questions. Honest answers.<br />Find out what's weird or totally normal.",
        support: "Support",
        socialTitle: "We're on social media"
      },
      uk: {
        brand: "Friendsphere.app",
        subtitle: "Ми створюємо додатки, які допомагають людям знаходити одне одного.",
        explore: "Переглянути додатки",
        learn: "Дізнатися більше",
        appName: "Стрьом чи норм?",
        appDescription: "Живі питання. Чесні відповіді.<br />Дізнайся, що стрьомно, а що абсолютно нормально.",
        support: "Підтримка",
        socialTitle: "Ми в соцмережах"
      }
    };

    const languageSelect = document.getElementById("languageSelect");

    function setLanguage(lang) {
      const dictionary = translations[lang] || translations.en;
      document.documentElement.lang = lang;
      localStorage.setItem("friendsphere_language", lang);

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const key = element.getAttribute("data-i18n");
        element.innerHTML = dictionary[key];
      });

      languageSelect.value = lang;
    }

    languageSelect.addEventListener("change", (event) => {
      setLanguage(event.target.value);
    });

    setLanguage(localStorage.getItem("friendsphere_language") || "en");
  </script>
</body>
</html>
